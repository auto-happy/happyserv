# Alertmanager Configuration — HappyServ

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.happyserv.fr:587'
  smtp_from: 'alertmanager@happyserv.fr'
  smtp_auth_username: 'alertmanager@happyserv.fr'
  smtp_auth_password: '<GENERATE_SMTP_PASSWORD>'
  smtp_require_tls: true

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route
route:
  group_by: ['alertname', 'severity', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h
      continue: true

    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 4h

    - match_re:
        severity: ^(info|none)$
      receiver: 'info'

# Inhibition
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']

  - source_match:
      severity: critical
    target_match_re:
      severity: ^(warning|info)$
    equal: ['job']

# Receivers
receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@happyserv.fr'
        send_resolved: true

  - name: 'critical'
    email_configs:
      - to: 'ops@happyserv.fr'
        send_resolved: true
        headers:
          subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: '<SLACK_WEBHOOK_URL>'
        channel: '#alerts-critical'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: 'danger'

  - name: 'warning'
    email_configs:
      - to: 'ops@happyserv.fr'
        send_resolved: true
        headers:
          subject: '[WARNING] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: '<SLACK_WEBHOOK_URL>'
        channel: '#alerts-warning'
        send_resolved: true
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: 'warning'

  - name: 'info'
    email_configs:
      - to: 'ops@happyserv.fr'
        send_resolved: false
