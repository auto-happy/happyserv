# Redis — Configuration Développement

port 6379

# No password for dev
requirepass ""

# No persistence for dev
save ""
appendonly no

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Logging
loglevel debug

# Connection
timeout 0
tcp-keepalive 300

# Security
protected-mode no
bind 0.0.0.0
