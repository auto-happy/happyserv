# Redis — Configuration Production

# Port
port 6379

# Security
requirepass <GENERATE_REDIS_PASSWORD>
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""

# Persistence
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Logging
loglevel notice
logfile ""

# Connection
maxclients 10000

# AOF (append-only file)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Security
protected-mode yes
bind 0.0.0.0
