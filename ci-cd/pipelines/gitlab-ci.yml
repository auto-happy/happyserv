stages:
  - quality
  - build
  - deploy
  - notify

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - api/node_modules/
    - portal/node_modules/
    - telehappy/node_modules/
    - client/node_modules/

.quality_template: &quality_job
  stage: quality
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint
    - npm run typecheck || true
    - npm test
  artifacts:
    reports:
      junit: junit.xml
    expire_in: 1 week

quality:api:
  <<: *quality_job
  variables:
    working_directory: api
  before_script:
    - cd api

quality:portal:
  <<: *quality_job
  variables:
    working_directory: portal
  before_script:
    - cd portal

quality:telehappy:
  <<: *quality_job
  variables:
    working_directory: telehappy
  before_script:
    - cd telehappy

quality:client:
  <<: *quality_job
  variables:
    working_directory: client
  before_script:
    - cd client

build:api:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $REGISTRY/happyserv/api:$IMAGE_TAG -t $REGISTRY/happyserv/api:latest ./api
    - docker push $REGISTRY/happyserv/api:$IMAGE_TAG
    - docker push $REGISTRY/happyserv/api:latest
  only:
    - main
    - develop

build:portal:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $REGISTRY/happyserv/portal:$IMAGE_TAG -t $REGISTRY/happyserv/portal:latest ./portal
    - docker push $REGISTRY/happyserv/portal:$IMAGE_TAG
    - docker push $REGISTRY/happyserv/portal:latest
  only:
    - main
    - develop

build:telehappy:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $REGISTRY/happyserv/telehappy:$IMAGE_TAG -t $REGISTRY/happyserv/telehappy:latest ./telehappy
    - docker push $REGISTRY/happyserv/telehappy:$IMAGE_TAG
    - docker push $REGISTRY/happyserv/telehappy:latest
  only:
    - main
    - develop

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cd /home/happyserv && git pull origin $CI_COMMIT_BRANCH && ./ci-cd/scripts/deploy.sh $CI_ENVIRONMENT_NAME && ./ci-cd/scripts/verify.sh $CI_ENVIRONMENT_NAME"
  environment:
    name: $CI_ENVIRONMENT_NAME
  only:
    - main

notify:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - 'curl -X POST -H "Content-type: application/json" --data "{\"text\":\"Pipeline $CI_PIPELINE_STATUS for $CI_PROJECT_NAME ($CI_COMMIT_SHORT_SHA)\"}" $SLACK_WEBHOOK_URL'
  only:
    - main
  when: always
