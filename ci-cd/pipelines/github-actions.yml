name: HappyServ CI/CD

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [api, portal, telehappy, client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.module }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.module }}
      - run: npm run lint
        working-directory: ${{ matrix.module }}
        continue-on-error: true
      - run: npm run typecheck
        working-directory: ${{ matrix.module }}
        continue-on-error: true
      - run: npm test
        working-directory: ${{ matrix.module }}

  build:
    name: Build & Docker
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [api, portal, telehappy, client]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.module }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.module }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.module }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/happyserv
            git pull origin main
            ./ci-cd/scripts/build.sh
            ./ci-cd/scripts/deploy.sh ${{ github.event.inputs.environment || 'dev' }}
            ./ci-cd/scripts/verify.sh ${{ github.event.inputs.environment || 'dev' }}

  notify:
    name: Notification
    needs: [quality, deploy]
    if: always() && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Notify status
        uses: act10ns/slack@v2
        with:
          status: ${{ needs.deploy.result }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
