#=============================================================================
# Configuration Maintenance — HappyServ
# Seuils, intervalles, URLs, rétention, chemins
#=============================================================================

# === Health Check ===
CHECK_URLS="https://telehappy.fr https://happyserv.fr https://api.happyserv.fr/health"
CHECK_CONTAINERS="happyserv-nginx happyserv-api happyserv-portal happyserv-telehappy happyserv-postgres happyserv-redis"
DISK_THRESHOLD=85
MEM_THRESHOLD=90
CPU_THRESHOLD=80
HEALTH_CHECK_INTERVAL=300

# === Backup ===
BACKUP_DIR=/backup
RETENTION_DAILY=7
RETENTION_WEEKLY=4
RETENTION_MONTHLY=3
BACKUP_TIMESTAMP_FORMAT="%Y%m%d-%H%M%S"

# === Auto-Update ===
COMPOSE_FILE=/home/happyserv/docker/compose/prod/docker-compose.yml
UPDATE_TIME="02:00"
UPDATE_MAX_RUNS=3

# === Notifications ===
SLACK_WEBHOOK_URL=
EMAIL_TO=ops@happyserv.fr
DEDUP_INTERVAL=300

# === Paths ===
HAPPYSERV_ROOT=/home/happyserv
LOGS_DIR=${HAPPYSERV_ROOT}/maintenance/logs
REPORTS_DIR=${HAPPYSERV_ROOT}/maintenance/reports
SCRIPTS_DIR=${HAPPYSERV_ROOT}/maintenance/scripts
NOTIFY_SCRIPT=${SCRIPTS_DIR}/notify.sh
BACKUP_SCRIPT=${SCRIPTS_DIR}/backup.sh
HEALTH_LOG=${LOGS_DIR}/health-check.log
